name: Generate Content

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    types: [closed]
    branches:
      - main

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # Skip bot commits to prevent infinite loop, and only run for merged PRs or pushes
    if: |
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'chore: save generated draft') &&
      (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate content
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run generate

      - name: Commit draft changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: save generated draft'
          file_pattern: 'data/drafts/*.json'
